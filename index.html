<!-- 모바일 메뉴 동작을 위한 경량 자바스크립트 -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById('navToggleBtn');
        const mobileMenu = document.getElementById('navMobileMenu');
        const toggleIcon = document.getElementById('toggleIcon');

        // 토글 버튼 클릭 이벤트
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const isHidden = mobileMenu.classList.contains('hidden');
            
            if (isHidden) {
                // 메뉴 열기
                mobileMenu.classList.remove('hidden');
                toggleIcon.classList.remove('fa-bars');
                toggleIcon.classList.add('fa-xmark');
            } else {
                // 메뉴 닫기
                mobileMenu.classList.add('hidden');
                toggleIcon.classList.remove('fa-xmark');
                toggleIcon.classList.add('fa-bars');
            }
        });

        // 화면 다른 곳을 클릭하면 모바일 메뉴 닫기
        document.addEventListener('click', function(e) {
            if (!mobileMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                mobileMenu.classList.add('hidden');
                toggleIcon.classList.remove('fa-xmark');
                toggleIcon.classList.add('fa-bars');
            }
        });
    });
</script>

    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-4 right-4 bg-brand-card border border-brand-orange text-white py-4 px-5 rounded-2xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-[110]">
        <h5 class="text-sm font-bold" id="toastTitle">메시지</h5>
    </div>

    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toastTitle');
            toastTitle.innerText = message;
            
            toast.style.borderColor = '#f97316';
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { 
                toast.classList.add('translate-y-20', 'opacity-0'); 
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        const ctaForm = document.getElementById('ctaForm');
        ctaForm.addEventListener('submit', (e) => {
            e.preventDefault();
            showToast("신청이 접수되었습니다! 🥩 민우와 함께 활력 넘치게 달려봅시다!");
            ctaForm.reset();
